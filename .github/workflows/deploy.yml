name: Deploy

# Builds happen here with the Node version pinned in .nvmrc, then wrangler
# only uploads the finished dist/ to Cloudflare. Cloudflare never runs a
# build, so its build-image Node version can never break this project.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - API token with "Workers Scripts: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - found on the Cloudflare dashboard, Workers page

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
